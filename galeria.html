<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lalhia - Galería de Recuerdos</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <style>
        body { 
            padding-bottom: 110px; /* Espacio para el nuevo nav */
            background-color: var(--crema);
        }
        
        .gallery-header {
            text-align: center;
            padding: 25px 20px;
        }

        /* --- BOTÓN SUBIR --- */
        .upload-section {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        /* --- GRID DE FOTOS --- */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .photo-card {
            background: white;
            border: var(--pixel-border);
            box-shadow: var(--pixel-shadow);
            padding: 8px;
            transition: 0.3s;
        }

        .photo-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border: 2px solid var(--cafe);
            display: block;
        }

        .photo-info {
            font-family: 'VT323', monospace;
            font-size: 1rem;
            margin-top: 5px;
            text-align: center;
            color: var(--cafe);
        }

        /* --- NUEVO MENÚ INFERIOR (PIXEL PREMIUM) --- */
        .pixel-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 400px;
            background: white;
            border: 4px solid var(--cafe);
            box-shadow: 6px 6px 0px var(--cafe);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 5px;
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: var(--cafe);
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            transition: 0.2s;
            flex: 1;
        }

        .nav-item span {
            font-size: 1.5rem;
        }

        .nav-item.active {
            color: var(--fresa);
            transform: translateY(-5px);
        }

        .nav-item.active span {
            filter: drop-shadow(2px 2px 0px var(--cafe));
        }

        /* Separador entre botones */
        .nav-item:not(:last-child) {
            border-right: 2px dashed var(--pastel);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header class="gallery-header">
        <h1 class="pixel-title">MOMENTOS</h1>
        <p style="font-family: 'VT323'; font-size: 1.4rem; color: var(--cafe);">ÁLBUM DE LALHIA ✨</p>
    </header>

    <div class="upload-section">
        <button id="upload_widget" class="btn-stellar" style="width: auto; padding: 10px 25px;">📸 SUBIR FOTO</button>
    </div>

    <div class="photo-grid" id="photoGrid"></div>

    <nav class="pixel-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>INICIO</a>
        <a href="galeria.html" class="nav-item active"><span>📸</span>GALERÍA</a>
        <a href="notas.html" class="nav-item"><span>📝</span>NOTAS</a>
        <a href="mood.html" class="nav-item"><span>☁️</span>MOOD</a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN WIDGET
        const myWidget = cloudinary.createUploadWidget({
            cloudName: 'djorci8hu', 
            uploadPreset: 'fotos_lalhia', // REVISA QUE EN CLOUDINARY SE LLAME IGUAL
            sources: ['local', 'camera', 'instagram'],
            styles: {
                palette: {
                    window: "#FFFFFF",
                    windowBorder: "#5C3D45",
                    tabIcon: "#FF4D6D",
                    textDark: "#5C3D45",
                    action: "#FF4D6D",
                    complete: "#20B832",
                    sourceBg: "#FFF0F3"
                }
            }
        }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                guardarReferenciaEnFirebase(result.info.secure_url);
            }
        });

        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open(), false);

        async function guardarReferenciaEnFirebase(urlImagen) {
            const autor = localStorage.getItem('usuarioLogueado') || "Aventurero";
            try {
                await addDoc(collection(db, "fotos"), {
                    url: urlImagen,
                    autor: autor,
                    fecha: serverTimestamp()
                });
                Swal.fire({ title: '¡Listo!', text: 'Recuerdo guardado 💖', icon: 'success', confirmButtonColor: '#ff4d6d' });
            } catch (e) {
                Swal.fire('Error', 'No se pudo guardar', 'error');
            }
        }

        const q = query(collection(db, "fotos"), orderBy("fecha", "desc"));
        onSnapshot(q, (snapshot) => {
            const photoGrid = document.getElementById('photoGrid');
            photoGrid.innerHTML = "";
            snapshot.forEach((doc) => {
                const foto = doc.data();
                const fecha = foto.fecha ? new Date(foto.fecha.toDate()).toLocaleDateString() : "...";
                photoGrid.innerHTML += `
                    <div class="photo-card" style="animation: popIn 0.5s ease-out;">
                        <img src="${foto.url}" loading="lazy">
                        <div class="photo-info">${foto.autor.toUpperCase()} <br> ${fecha}</div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
