<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lalhia Arcade - Super Kawaii</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --neon-rosa: #ff007f;
            --neon-azul: #00f3ff;
            --pastel-rosa: #ffc2d1;
            --p-oscuro: #2d1317;
            --sombra-neon: 0 0 15px var(--neon-rosa), 0 0 5px white;
        }

        body {
            margin: 0; 
            overflow: hidden; font-family: 'VT323', monospace; 
            touch-action: none;
            background-image: url('cielo.jpg'); 
            background-size: cover; 
            background-position: center;
            background-color: #000;
        }

        /* --- PANTALLA INICIO --- */
        #selector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, var(--p-oscuro) 0%, #000 100%);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }

        .pixel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 4px solid var(--neon-rosa);
            border-radius: 20px;
            padding: 30px; text-align: center; width: 85%; max-width: 350px;
            box-shadow: var(--sombra-neon);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .perfil-img {
            width: 130px; height: 130px; 
            border: 4px solid var(--neon-azul);
            border-radius: 50%; margin: 15px 0;
            box-shadow: 0 0 20px var(--neon-azul);
            object-fit: cover; background: white;
        }

        .btn-start {
            background: var(--neon-rosa); 
            border: none;
            color: white; padding: 12px 30px;
            font-family: 'VT323', monospace; font-size: 2.2rem;
            cursor: pointer; border-radius: 10px;
            text-shadow: 2px 2px 0px black;
            box-shadow: 0 0 15px var(--neon-rosa);
            transition: 0.3s;
        }

        .btn-start:active { transform: scale(0.9); }

        /* --- JUEGO --- */
        #game-container { width: 100vw; height: 100vh; position: relative; }
        
        #ground {
            position: absolute; bottom: 0; width: 100%; height: 90px;
            background-image: url('Sico.jpg'); 
            background-size: cover; background-position: center;
            z-index: 1;
        }

        #player {
            width: 110px; height: 110px; 
            position: absolute; bottom: 70px; left: 50%;
            background-size: contain; background-repeat: no-repeat;
            image-rendering: auto; z-index: 10;
            filter: drop-shadow(0 0 10px var(--neon-rosa));
            transition: transform 0.1s;
            will-change: left;
        }

        .item { 
            position: absolute; font-size: 50px; 
            filter: drop-shadow(0 0 8px white);
            z-index: 5; 
            will-change: top;
        }

        /* --- UI MODERNA --- */
        #ui {
            position: absolute; top: 0; width: 100%; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .stats-group { color: white; text-shadow: 2px 2px 0 var(--neon-rosa); font-size: 1.8rem; }
        
        #pause-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white; color: white;
            border-radius: 50%; width: 45px; height: 45px;
            font-size: 1.5rem; cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .power-up { font-size: 60px; filter: drop-shadow(0 0 15px gold) !important; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Estilos SweetAlert */
        .swal2-popup { border: 3px solid var(--neon-rosa) !important; border-radius: 20px !important; }
    </style>
</head>
<body>

    <div id="selector">
        <div class="pixel-card">
            <h1 style="color:var(--neon-azul); margin:0; text-shadow: 2px 2px 0 black;">✨ LALHIA WORLD ✨</h1>
            <img id="player-photo" src="" class="perfil-img">
            <p id="user-name" style="color:white; font-size: 1.8rem; margin: 10px 0;"></p>
            <button class="btn-start" onclick="iniciarJuego()">¡JUGAR! ✨</button>
            <p style="color: var(--pastel-rosa); margin-top: 15px;">RECORD: <span id="best-score">0000</span></p>
        </div>
    </div>

    <div id="ui">
        <div class="stats-group">
            <div>PUNTOS: <span id="score">0000</span></div>
            <div id="lives">💖💖💖</div>
        </div>
        <button id="pause-btn" onclick="pausarJuego()">⏸</button>
    </div>

    <div id="game-container">
        <div id="player"></div>
        <div id="ground"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const container = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        
        let score = 0;
        let lives = 3;
        let gameActive = false;
        let isPaused = false;
        let speed = 6;
        let spriteJugador = "";
        let lastX = 0;
        let gameLoopTimeout;

        window.onload = function() {
            const usuarioLogueado = localStorage.getItem('usuarioActual') || 'Mahia'; 
            const playerPhoto = document.getElementById('player-photo');
            const userName = document.getElementById('user-name');

            if(usuarioLogueado === 'Lalo') {
                userName.innerText = "HOLA, LALO ✨";
                playerPhoto.src = "lalitoperfil.png"; 
                spriteJugador = "lalitogame.png";
            } else {
                userName.innerText = "HOLA, MAHIA ✨";
                playerPhoto.src = "mahitaperfil.png"; 
                spriteJugador = "mahitagame.png";
            }

            const records = JSON.parse(localStorage.getItem('records_atrapa')) || [];
            if(records.length > 0) document.getElementById('best-score').innerText = records[0].puntaje;
        }

        function iniciarJuego() {
            document.getElementById('selector').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('selector').style.display = 'none';
                player.style.backgroundImage = `url('${spriteJugador}')`;
                gameActive = true;
                loop();
            }, 500);
        }

        function pausarJuego() {
            if (!gameActive) return;
            isPaused = true;
            Swal.fire({
                title: 'PAUSA ⏸',
                background: '#2d1317',
                color: '#ffc2d1',
                showCancelButton: true,
                confirmButtonText: 'CONTINUAR ✨',
                cancelButtonText: 'SALIR AL MENÚ ⬅',
                confirmButtonColor: '#ff007f',
                reverseButtons: true,
                allowOutsideClick: false
            }).then((result) => {
                if (result.isConfirmed) {
                    isPaused = false;
                } else if (result.dismiss === Swal.DismissReason.cancel) {
                    window.location.href = 'juegos.html';
                }
            });
        }

        function movePlayer(clientX) {
            if(!gameActive || isPaused) return;
            const playerWidth = player.offsetWidth;
            let newX = clientX - (playerWidth / 2);
            
            if (clientX > lastX) player.style.transform = "rotate(8deg) scale(1.05)";
            else if (clientX < lastX) player.style.transform = "rotate(-8deg) scale(1.05)";
            lastX = clientX;

            if (newX < 0) newX = 0;
            if (newX > window.innerWidth - playerWidth) newX = window.innerWidth - playerWidth;
            
            player.style.left = newX + 'px';
        }

        container.addEventListener('touchmove', (e) => { movePlayer(e.touches[0].clientX); e.preventDefault(); }, {passive: false});
        container.addEventListener('touchstart', (e) => { movePlayer(e.touches[0].clientX); }, {passive: false});
        container.addEventListener('mousemove', (e) => { movePlayer(e.clientX); });
        container.addEventListener('touchend', () => { player.style.transform = "rotate(0deg) scale(1)"; });

        function spawnItem() {
            if(!gameActive || isPaused) return;
            const item = document.createElement('div');
            item.className = 'item';
            
            const isPowerUp = Math.random() > 0.92;
            const foods = ['🍎', '🍕', '🍔', '🍦', '🍩', '🍓', '🍰', '🍭', '🍉', '🥐'];
            const powers = ['⭐', '💖']; 
            
            if (isPowerUp) {
                item.innerText = powers[Math.floor(Math.random() * powers.length)];
                item.classList.add('power-up');
            } else {
                item.innerText = foods[Math.floor(Math.random() * foods.length)];
            }
            
            const margin = 50;
            item.style.left = Math.random() * (window.innerWidth - (margin * 2)) + margin + 'px';
            container.appendChild(item);

            let pos = -100;
            const fall = setInterval(() => {
                if(!gameActive) { clearInterval(fall); item.remove(); return; }
                if(isPaused) return; // Congela el objeto si hay pausa
                
                pos += speed;
                item.style.top = pos + 'px';
                item.style.transform = `rotate(${pos / 4}deg)`;

                const pRect = player.getBoundingClientRect();
                const iRect = item.getBoundingClientRect();

                // Colisión ajustada
                if(iRect.bottom > pRect.top + 40 && 
                   iRect.left < pRect.right - 20 && 
                   iRect.right > pRect.left + 20 && 
                   iRect.top < pRect.bottom - 20) {
                    
                    if (item.innerText === '⭐') {
                        score += 100;
                        lanzarConfetti('gold');
                    } else if (item.innerText === '💖') {
                        if(lives < 3) lives++;
                        livesElement.innerText = "💖".repeat(lives);
                        lanzarConfetti('#ff007f');
                    } else {
                        score += 10;
                    }

                    scoreElement.innerText = score.toString().padStart(4, '0');
                    if(score > 0 && score % 300 === 0) speed += 0.5;
                    
                    item.remove();
                    clearInterval(fall);
                }

                // Si cae al mantel de picnic
                if(pos > window.innerHeight - 100) {
                    if (!item.classList.contains('power-up')) {
                        lives--;
                        livesElement.innerText = "💖".repeat(lives);
                        // Efecto de vibración al perder vida
                        document.body.style.animation = "shake 0.2s";
                        setTimeout(() => document.body.style.animation = "", 200);
                    }
                    item.remove();
                    clearInterval(fall);
                    if(lives <= 0) gameOver();
                }
            }, 20);
        }

        function lanzarConfetti(color) {
            confetti({
                particleCount: 20,
                spread: 50,
                origin: { y: 0.8 },
                colors: [color, '#ffffff']
            });
        }

        function gameOver() {
            gameActive = false;
            let records = JSON.parse(localStorage.getItem('records_atrapa')) || [];
            records.push({ puntaje: score, fecha: new Date().toLocaleDateString() });
            records.sort((a,b) => b.puntaje - a.puntaje);
            localStorage.setItem('records_atrapa', JSON.stringify(records.slice(0,5)));

            Swal.fire({
                title: '💔 GAME OVER 💔',
                text: `Puntaje: ${score}`,
                background: '#2d1317',
                color: '#ffc2d1',
                showCancelButton: true,
                confirmButtonText: 'REINTENTAR ✨',
                cancelButtonText: 'MENU DE JUEGOS ⬅',
                confirmButtonColor: '#ff007f',
                reverseButtons: true,
                allowOutsideClick: false
            }).then((result) => {
                if (result.isConfirmed) {
                    location.reload();
                } else {
                    window.location.href = 'juegos.html';
                }
            });
        }

        function loop() {
            if(!gameActive) return;
            if(!isPaused) spawnItem();
            
            let spawnRate = Math.max(300, 1000 - (score * 0.5));
            gameLoopTimeout = setTimeout(loop, spawnRate);
        }
    </script>

    <style>
        /* Animación de vibración cuando pierdes vida */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-1px, -1px) rotate(0deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
    </style>
</body>
</html>
