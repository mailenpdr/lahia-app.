<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lalhia Jump Arcade - Neon Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --neon-rosa: #ff007f;
            --neon-azul: #00f3ff;
            --fondo-arcade: #000000;
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #1a050f 0%, var(--fondo-arcade) 100%);
            font-family: 'VT323', monospace;
            color: white; overflow: hidden;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- MENÚ --- */
        #menu-container {
            background: rgba(0, 0, 0, 0.95);
            border: 4px solid var(--neon-rosa);
            border-radius: 20px; padding: 30px; text-align: center;
            width: 85%; max-width: 400px; 
            box-shadow: 0 0 20px var(--neon-rosa), inset 0 0 10px var(--neon-rosa);
            z-index: 100;
        }

        .char-box {
            display: flex; justify-content: center; gap: 20px; margin: 20px 0;
        }

        .perfil-bloqueado {
            filter: grayscale(1) blur(1px);
            opacity: 0.3;
            cursor: not-allowed;
            transform: scale(0.8);
        }

        .perfil-activo {
            filter: drop-shadow(0 0 10px var(--neon-azul));
            opacity: 1;
            border: 2px solid var(--neon-azul);
            border-radius: 15px; padding: 10px;
            background: rgba(0, 243, 255, 0.1);
        }

        .char-img { width: 80px; height: 80px; object-fit: contain; }

        /* --- BOTONES --- */
        .btn {
            font-family: 'VT323'; font-size: 1.8rem;
            cursor: pointer; border-radius: 10px; width: 100%;
            margin-top: 15px; text-shadow: 2px 2px 0 black;
            border: none; color: white; transition: 0.2s;
        }

        .btn-start { background: var(--neon-rosa); box-shadow: 0 4px 0 #b30059; }
        .btn-start:active { transform: translateY(4px); box-shadow: none; }

        .btn-exit { background: #444; box-shadow: 0 4px 0 #222; }
        .btn-exit:active { transform: translateY(4px); box-shadow: none; }

        /* --- ÁREA DE JUEGO --- */
        #game-area {
            position: relative; width: 100%; max-width: 800px; height: 400px;
            background: #ffa0a0; border: 3px solid var(--neon-rosa);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
            display: none; overflow: hidden;
        }

        #player {
            position: absolute; width: 70px; height: 80px;
            bottom: 0; left: 50px;
            background-size: contain; background-repeat: no-repeat;
            z-index: 10;
        }

        .obstaculo {
            position: absolute; width: 40px; bottom: 0;
            background: var(--neon-azul);
            box-shadow: 0 0 15px var(--neon-azul), inset 0 0 10px white;
            border-radius: 5px 5px 0 0;
        }

        #ui { 
            position: absolute; top: 15px; width: 100%; 
            display: flex; justify-content: space-around; 
            font-size: 2rem; color: var(--neon-azul); text-shadow: 0 0 10px var(--neon-azul);
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1 style="color:var(--neon-rosa); margin: 0; font-size: 3rem;">JUMP ARCADE</h1>
        <p id="user-display" style="color:white; font-size: 1.2rem; margin-top: 5px;"></p>
        
        <div class="char-box">
            <div id="card-mahia" class="perfil-bloqueado">
                <img src="mahitagame.png" class="char-img"><br>MAHITA
            </div>
            <div id="card-lalo" class="perfil-bloqueado">
                <img src="lalitogame.png" class="char-img"><br>LALITO
            </div>
        </div>

        <button class="btn btn-start" onclick="iniciar()">INICIAR ARCADE 🕹️</button>
        <button class="btn btn-exit" onclick="window.location.href='juegos.html'">SALIR AL MENÚ ⬅️</button>
        
        <p style="margin-top:20px; font-size: 1.5rem;">HI-SCORE: <span id="record-val" style="color:var(--neon-rosa)">0</span></p>
    </div>

    <div id="game-area">
        <div id="ui">
            <span>SCORE: <b id="score">0</b></span>
            <span>BEST: <b id="hi-score">0</b></span>
        </div>
        <div id="player"></div>
    </div>

    <script>
        // Configuración de Cuenta y Récords
        const usuario = localStorage.getItem('usuarioActual') || 'Mahia';
        const recordKey = `record_jump_${usuario.toLowerCase()}`;
        let score = 0;
        let record = localStorage.getItem(recordKey) || 0;
        
        let jugando = false;
        let playerY = 0;
        let velY = 0;
        let velocidadObstaculos = 7;
        let listaObstaculos = [];

        window.onload = () => {
            document.getElementById('user-display').innerText = `PILOTO: ${usuario.toUpperCase()}`;
            document.getElementById('record-val').innerText = record;
            document.getElementById('hi-score').innerText = record;

            // Bloquear personaje según cuenta
            if(usuario.toLowerCase() === 'lalo') {
                document.getElementById('card-lalo').className = 'perfil-activo';
                document.getElementById('player').style.backgroundImage = "url('lalitogame.png')";
            } else {
                document.getElementById('card-mahia').className = 'perfil-activo';
                document.getElementById('player').style.backgroundImage = "url('mahitagame.png')";
            }
        };

        function iniciar() {
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            jugando = true;
            score = 0;
            velocidadObstaculos = 7;
            gameLoop();
            spawnManager();
        }

        function gameLoop() {
            if(!jugando) return;

            // Físicas del salto
            playerY += velY;
            velY -= 1.2; // Gravedad
            if(playerY <= 0) { playerY = 0; velY = 0; }
            document.getElementById('player').style.bottom = playerY + 'px';

            // Manejo de obstáculos
            const obstaculos = document.querySelectorAll('.obstaculo');
            const pRect = document.getElementById('player').getBoundingClientRect();

            obstaculos.forEach(o => {
                let x = parseFloat(o.style.left) - velocidadObstaculos;
                o.style.left = x + 'px';

                // Colisión (con margen de error para que sea justo)
                let oRect = o.getBoundingClientRect();
                if (pRect.right - 20 > oRect.left && 
                    pRect.left + 20 < oRect.right && 
                    pRect.bottom - 10 > oRect.top) {
                    finalizarJuego();
                }

                // Punto y limpieza
                if (x < -50) {
                    o.remove();
                    score += 10;
                    document.getElementById('score').innerText = score;
                    // Aumentar velocidad cada 100 puntos
                    if(score % 100 === 0) velocidadObstaculos += 0.4;
                }
            });

            requestAnimationFrame(gameLoop);
        }

        function spawnManager() {
            if(!jugando) return;
            
            const o = document.createElement('div');
            o.className = 'obstaculo';
            o.style.left = '850px';
            o.style.height = (Math.floor(Math.random() * 40) + 40) + 'px';
            document.getElementById('game-area').appendChild(o);

            // Tiempo aleatorio entre obstáculos para que no sea predecible
            let proximoSpawn = Math.random() * 1000 + 700; 
            setTimeout(spawnManager, proximoSpawn);
        }

        function finalizarJuego() {
            jugando = false;
            if(score > record) {
                localStorage.setItem(recordKey, score);
            }

            Swal.fire({
                title: 'GAME OVER',
                html: `<span style="font-size:1.5rem">SCORE: ${score}</span>`,
                background: '#000',
                color: '#ff007f',
                confirmButtonText: 'REINTENTAR',
                showCancelButton: true,
                cancelButtonText: 'SALIR',
                confirmButtonColor: '#ff007f',
                cancelButtonColor: '#444'
            }).then((res) => {
                if(res.isConfirmed) location.reload();
                else window.location.href = 'juegos.html';
            });
        }

        // Controles
        function triggerJump() {
            if(playerY === 0 && jugando) velY = 19;
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') triggerJump(); });
        document.getElementById('game-area').addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerJump();
        });
    </script>
</body>
</html>
