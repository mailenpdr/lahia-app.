<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lalhia Memorama Arcade - Deluxe</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --neon-rosa: #ff007f;
            --neon-azul: #00f3ff;
            --p-oscuro: #2d1317;
            --sombra: 0 0 15px var(--neon-rosa);
        }

        body {
            margin: 0; padding: 0;
            background-image: url('download.jpg');
            background-size: cover; background-position: center;
            font-family: 'VT323', monospace;
            color: white; overflow-x: hidden;
            background-color: black;
        }

        /* --- PERSONAJES SALTANDO POR TODA LA PANTALLA --- */
        .mascota-fondo {
            position: fixed;
            width: 100px;
            z-index: -1;
            pointer-events: none;
            filter: drop-shadow(0 0 10px var(--neon-rosa));
        }

        /* Animación de Mahita: Rebote amplio */
        #mahita-float {
            animation: saltarPantallaMahita 12s linear infinite;
        }

        /* Animación de Lalito: Rebote inverso para cruzarse */
        #lalito-float {
            animation: saltarPantallaLalito 15s linear infinite;
        }

        @keyframes saltarPantallaMahita {
            0%   { top: 10%; left: 10%; transform: rotate(10deg); }
            25%  { top: 70%; left: 30%; transform: rotate(-10deg) scaleX(-1); }
            50%  { top: 20%; left: 80%; transform: rotate(10deg) scaleX(-1); }
            75%  { top: 80%; left: 60%; transform: rotate(-10deg) scaleX(1); }
            100% { top: 10%; left: 10%; transform: rotate(10deg); }
        }

        @keyframes saltarPantallaLalito {
            0%   { top: 80%; left: 80%; transform: rotate(-10deg); }
            25%  { top: 20%; left: 60%; transform: rotate(10deg) scaleX(-1); }
            50%  { top: 70%; left: 10%; transform: rotate(-10deg) scaleX(-1); }
            75%  { top: 10%; left: 40%; transform: rotate(10deg) scaleX(1); }
            100% { top: 80%; left: 80%; transform: rotate(-10deg); }
        }

        .corazon-particula {
            position: absolute;
            font-size: 25px;
            color: var(--neon-rosa);
            text-shadow: 0 0 5px white;
            animation: desvanecerCorazon 2s ease-out forwards;
            z-index: -1;
        }

        @keyframes desvanecerCorazon {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5) translateY(-30px); opacity: 0; }
        }

        /* --- ANIMACIONES DE ENTRADA --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes pulseTime { from { filter: brightness(1); } to { filter: brightness(1.5); box-shadow: 0 0 20px red; } }

        /* --- MENÚ DE INICIO --- */
        #selector {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, var(--p-oscuro) 0%, #000 100%);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }

        .pixel-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 4px solid var(--neon-rosa);
            border-radius: 20px; padding: 30px; text-align: center;
            width: 85%; max-width: 400px; box-shadow: var(--sombra);
            animation: fadeIn 0.8s ease-out;
        }

        .perfil-img {
            width: 110px; height: 110px; border-radius: 50%;
            border: 4px solid var(--neon-azul); margin: 15px 0;
            object-fit: cover; background: white;
            box-shadow: 0 0 15px var(--neon-azul);
        }

        .btn-start {
            background: var(--neon-rosa); color: white; border: none;
            padding: 12px 20px; font-family: 'VT323'; font-size: 1.8rem;
            cursor: pointer; border-radius: 10px; width: 100%;
            margin: 10px 0; text-shadow: 2px 2px 0 black;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-start:active { transform: scale(0.9); }

        /* --- UI JUEGO --- */
        #game-container { animation: fadeIn 0.5s ease-in; }

        #ui-superior {
            background: rgba(0,0,0,0.8); padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--neon-rosa);
        }

        .timer-container {
            width: 50%; height: 25px; background: #333;
            border-radius: 15px; border: 2px solid white; overflow: hidden;
        }

        #timer-bar {
            width: 100%; height: 100%; background: var(--neon-rosa);
            box-shadow: 0 0 10px var(--neon-rosa);
        }

        .timer-low { animation: pulseTime 0.5s infinite alternate; background: #ff0000 !important; }

        #grid {
            display: grid; gap: 10px; padding: 20px;
            margin: 0 auto; max-width: 600px;
            justify-content: center;
        }

        /* --- CARTAS --- */
        .card {
            width: 75px; height: 75px; position: relative;
            transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.5);
        }

        .card-front {
            background: linear-gradient(135deg, #4b1a21 0%, #2d1317 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; color: var(--neon-rosa);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .card-back {
            background-size: cover; background-position: center;
            transform: rotateY(180deg); background-color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .turn-active { color: var(--neon-azul); text-shadow: 0 0 15px var(--neon-azul); transform: scale(1.1); display: inline-block; }

        .shake-effect { animation: shake 0.4s; }
    </style>
</head>
<body>

    <img src="mahitagame.png" id="mahita-float" class="mascota-fondo">
    <img src="lalitogame.png" id="lalito-float" class="mascota-fondo">

    <div id="selector">
        <div class="pixel-card">
            <h1 style="color:var(--neon-azul); margin:0; letter-spacing: 2px;">MEMORAMA ARCADE</h1>
            <img id="player-photo" src="" class="perfil-img">
            <p id="user-name" style="font-size: 1.8rem; margin: 10px 0;"></p>
            
            <button class="btn-start" onclick="iniciar(false)">INDIVIDUAL ✨</button>
            <button class="btn-start" style="background:var(--neon-azul)" onclick="iniciar(true)">2 JUGADORES ⚔️</button>
            <button class="btn-start" style="background:#555" onclick="window.location.href='juegos.html'">SALIR ⬅</button>
            <p style="color: var(--neon-rosa)">RÉCORD: <span id="best-score">0000</span></p>
        </div>
    </div>

    <div id="game-container" style="display:none">
        <div id="ui-superior">
            <div id="stats-solo" style="font-size: 1.5rem;">LVL: <span id="lvl" style="color:var(--neon-azul)">1</span></div>
            <div id="stats-vs" style="display:none; font-size: 1.2rem;">
                <span id="p1-label">P1: <b id="p1-s">0</b></span> | <span id="p2-label">P2: <b id="p2-s">0</b></span>
            </div>
            <div class="timer-container" id="timer-box">
                <div id="timer-bar"></div>
            </div>
            <button onclick="pausar()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer; transition: 0.3s;">⏸</button>
        </div>
        
        <div id="grid"></div>
    </div>

    <script>
        // Lógica para que los corazones sigan a los personajes saltarines
        setInterval(() => {
            crearCorazon('mahita-float');
            crearCorazon('lalito-float');
        }, 600);

        function crearCorazon(id) {
            const pet = document.getElementById(id);
            const rect = pet.getBoundingClientRect();
            const cora = document.createElement('div');
            cora.className = 'corazon-particula';
            cora.innerText = '❤';
            cora.style.left = (rect.left + rect.width/2) + 'px';
            cora.style.top = (rect.top + rect.height/2) + 'px';
            document.body.appendChild(cora);
            setTimeout(() => cora.remove(), 2000);
        }

        let config = {
            nivel: 1, pares: 2, tiempo: 25, solo: true,
            turno: 1, ptosP1: 0, ptosP2: 0,
            jugando: false, pausado: false
        };
        
        let barInterval;
        let flipped = [];
        let matches = 0;

        window.onload = () => {
            const user = localStorage.getItem('usuarioActual') || 'Mahia';
            document.getElementById('user-name').innerText = `HOLA, ${user.toUpperCase()}`;
            document.getElementById('player-photo').src = user === 'Lalo' ? 'lalitoperfil.png' : 'mahitaperfil.png';
            const record = JSON.parse(localStorage.getItem('records_memo')) || 0;
            document.getElementById('best-score').innerText = record;
        };

        function iniciar(esVS) {
            config.solo = !esVS;
            config.nivel = 1;
            config.pares = esVS ? 21 : 3;
            config.ptosP1 = 0; config.ptosP2 = 0;
            config.turno = 1;
            
            document.getElementById('selector').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            if(!config.solo) {
                document.getElementById('stats-vs').style.display = 'block';
                document.getElementById('stats-solo').style.display = 'none';
                document.getElementById('timer-box').style.display = 'none';
                actualizarMarcadorVS();
            } else {
                document.getElementById('stats-vs').style.display = 'none';
                document.getElementById('stats-solo').style.display = 'block';
                document.getElementById('timer-box').style.display = 'block';
                document.getElementById('lvl').innerText = "1";
            }
            
            cargarNivel();
        }

        function cargarNivel() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            flipped = [];
            matches = 0;
            config.jugando = false;

            let columnas = config.pares <= 6 ? 3 : (config.pares <= 12 ? 4 : 6);
            grid.style.gridTemplateColumns = `repeat(${columnas}, 1fr)`;
            if(window.innerWidth < 400) grid.style.gridTemplateColumns = `repeat(${config.pares <= 12 ? 3 : 4}, 1fr)`;

            let totalImages = Array.from({length: 21}, (_, i) => i + 1);
            totalImages.sort(() => Math.random() - 0.5);
            let seleccion = totalImages.slice(0, config.pares);
            let mazo = [...seleccion, ...seleccion].sort(() => Math.random() - 0.5);

            mazo.forEach(num => {
                const card = document.createElement('div');
                card.className = 'card flipped';
                card.dataset.val = num;
                const ext = num <= 19 ? 'jpg' : 'png';
                card.innerHTML = `
                    <div class="card-front">?</div>
                    <div class="card-back" style="background-image:url('${num}.${ext}')"></div>
                `;
                grid.appendChild(card);
            });

            setTimeout(() => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('flipped'));
                config.jugando = true;
                if(config.solo) iniciarReloj();
            }, 2000);
        }

        function iniciarReloj() {
            clearInterval(barInterval);
            let t = 100;
            const bar = document.getElementById('timer-bar');
            bar.classList.remove('timer-low');
            
            barInterval = setInterval(() => {
                if(config.pausado || !config.jugando) return;
                t -= (100 / (config.tiempo * 10));
                bar.style.width = t + "%";
                
                if(t < 30) bar.classList.add('timer-low');
                
                if(t <= 0) {
                    clearInterval(barInterval);
                    gameOver("¡TIEMPO AGOTADO! 💔");
                }
            }, 100);
        }

        document.getElementById('grid').onclick = (e) => {
            const card = e.target.closest('.card');
            if(!card || !config.jugando || card.classList.contains('flipped') || flipped.length >= 2) return;

            card.classList.add('flipped');
            flipped.push(card);

            if(flipped.length === 2) checkMatch();
        };

        function checkMatch() {
            const [c1, c2] = flipped;
            if(c1.dataset.val === c2.dataset.val) {
                matches++;
                if(!config.solo) {
                    if(config.turno === 1) config.ptosP1++; else config.ptosP2++;
                    actualizarMarcadorVS();
                }
                flipped = [];
                if(matches === config.pares) finNivel();
            } else {
                config.jugando = false;
                setTimeout(() => {
                    c1.classList.add('shake-effect');
                    c2.classList.add('shake-effect');
                    setTimeout(() => {
                        c1.classList.remove('flipped', 'shake-effect');
                        c2.classList.remove('flipped', 'shake-effect');
                        if(!config.solo) {
                            config.turno = config.turno === 1 ? 2 : 1;
                            actualizarMarcadorVS();
                        }
                        flipped = [];
                        config.jugando = true;
                    }, 400);
                }, 500);
            }
        }

        function finNivel() {
            config.jugando = false;
            clearInterval(barInterval);
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.7 }, colors: [config.solo ? '#ff007f' : '#00f3ff', '#ffffff'] });

            if(config.solo) {
                if(config.nivel >= 30) {
                    gameOver("¡ERES UNA LEYENDA! 🏆");
                    return;
                }
                config.nivel++;
                config.pares = Math.min(21, 3 + Math.floor(config.nivel / 2));
                config.tiempo = Math.max(8, 25 - config.nivel);
                setTimeout(cargarNivel, 1200);
                document.getElementById('lvl').innerText = config.nivel;
            } else {
                let ganador = config.ptosP1 > config.ptosP2 ? "¡GANÓ JUGADOR 1! 🏆" : "¡GANÓ JUGADOR 2! 🏆";
                if(config.ptosP1 === config.ptosP2) ganador = "¡EMPATE TÉCNICO! 🤝";
                setTimeout(() => gameOver(ganador), 1000);
            }
        }

        function actualizarMarcadorVS() {
            document.getElementById('p1-s').innerText = config.ptosP1;
            document.getElementById('p2-s').innerText = config.ptosP2;
            document.getElementById('p1-label').className = config.turno === 1 ? 'turn-active' : '';
            document.getElementById('p2-label').className = config.turno === 2 ? 'turn-active' : '';
        }

        function pausar() {
            config.pausado = true;
            Swal.fire({
                title: 'PAUSA ⏸',
                background: '#2d1317',
                color: 'white',
                showCancelButton: true,
                confirmButtonText: 'CONTINUAR ✨',
                cancelButtonText: 'SALIR AL MENÚ ⬅',
                confirmButtonColor: '#ff007f',
                reverseButtons: true
            }).then((r) => {
                if(r.isConfirmed) config.pausado = false;
                else window.location.href = 'juegos.html';
            });
        }

        function gameOver(txt) {
            if(config.solo) {
                let record = JSON.parse(localStorage.getItem('records_memo')) || 0;
                if(config.nivel > record) localStorage.setItem('records_memo', config.nivel);
            }

            Swal.fire({
                title: txt,
                html: config.solo ? `Nivel: ${config.nivel}` : `Puntos P1: ${config.ptosP1}<br>Puntos P2: ${config.ptosP2}`,
                background: '#2d1317',
                color: 'white',
                confirmButtonText: 'REINTENTAR 🔄',
                showCancelButton: true,
                cancelButtonText: 'SALIR AL MENÚ ⬅',
                confirmButtonColor: '#ff007f',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) location.reload();
                else window.location.href = 'juegos.html';
            });
        }
    </script>
</body>
</html>
