<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lalhia Puzzle Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --neon-rosa: #ff007f;
            --neon-azul: #00f3ff;
            --neon-morado: #bc13fe;
            /* Fondo un poco más claro como pediste */
            --fondo: #1a0525; 
        }

        body {
            margin: 0; background: var(--fondo);
            font-family: 'VT323', monospace; color: white;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }

        h1 { font-size: 12vw; color: var(--neon-azul); text-shadow: 0 0 20px var(--neon-azul); margin: 15px 0; }

        /* --- GALERÍA --- */
        #gallery-container { width: 95%; max-width: 500px; text-align: center; z-index: 10; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border: 2px solid var(--neon-morado); border-radius: 8px; cursor: pointer; }

        /* --- TABLERO RESPONSIVO --- */
        #game-area { display: none; flex-direction: column; align-items: center; width: 100%; z-index: 10; }
        #puzzle-board {
            display: grid; grid-template-columns: repeat(3, 1fr);
            width: 88vw; height: 88vw; max-width: 340px; max-height: 340px;
            gap: 6px; padding: 10px;
            background: rgba(188, 19, 254, 0.3);
            border: 3px solid var(--neon-morado);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.5); border-radius: 15px;
        }
        .tile {
            width: 100%; height: 100%;
            background-size: 305% 305%;
            border-radius: 6px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .tile:active { transform: scale(0.9); }
        .empty { background: rgba(0,0,0,0.4) !important; border: 1px dashed var(--neon-morado); }

        /* --- UI BOTONES --- */
        .btn-group { display: flex; gap: 10px; justify-content: center; width: 90%; margin-top: 20px; }
        .btn {
            background: var(--neon-rosa); color: white; border: none;
            padding: 10px 15px; font-family: 'VT323'; font-size: 1.5rem;
            border-radius: 10px; cursor: pointer;
            box-shadow: 0 5px 0 #b30059; flex: 1; max-width: 150px;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-alt { background: #444; box-shadow: 0 5px 0 #222; }

        /* --- PORRAS FLOTANTES --- */
        .cheer { position: fixed; width: 110px; z-index: 100; opacity: 0; transition: 0.7s; pointer-events: none; transform: scale(0.5); }
        .cheer.active { opacity: 1; transform: scale(1); }
        .bubble {
            background: white; color: black; padding: 8px; border-radius: 12px;
            position: absolute; width: 100px; text-align: center; font-size: 1.1rem;
            border: 2px solid var(--neon-rosa); top: -45px; left: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .heart { position: fixed; color: #ff007f; font-size: 2rem; animation: floatH 1.5s forwards; z-index: 101; }
        @keyframes floatH { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <h1>PUZZLE</h1>

    <div id="gallery-container">
        <p style="font-size: 1.4rem;">¡Elige una foto para empezar! ✨</p>
        <div class="gallery-grid" id="gallery"></div>
        <button class="btn btn-alt" style="margin-top:25px; width:80%;" onclick="window.location.href='juegos.html'">VOLVER AL MENÚ ⬅️</button>
    </div>

    <div id="game-area">
        <h2 id="moves" style="font-size: 2rem; color: var(--neon-azul); margin: 0 0 15px 0;">MOVIMIENTOS: 0</h2>
        <div id="puzzle-board"></div>
        
        <div class="btn-group">
            <button class="btn btn-alt" onclick="location.reload()">GALERÍA</button>
            <button class="btn" onclick="window.location.href='juegos.html'">SALIR ⬅️</button>
        </div>
    </div>

    <div id="mahita-c" class="cheer"><div class="bubble"></div><img src="mahitagame.png" style="width:100%"></div>
    <div id="lalito-c" class="cheer"><div class="bubble"></div><img src="lalitogame.png" style="width:100%"></div>

    <script>
        const gallery = document.getElementById('gallery');
        const board = document.getElementById('puzzle-board');
        let order = [0, 1, 2, 3, 4, 5, 6, 7, 8];
        let moves = 0;
        let selectedImg = "";

        // TUS FRASES ORIGINALES RESTAURADAS
        const frasesMahia = ["¡Tú puedes, amor!", "¡si se puedeeee!", "¡Ya casi!", "¡Eres el mejor! ❤️"];
        const frasesLalo = ["chikitibunalabimbomba!", "¡falta poquis!", "¡oemege!", "¡Te amo! ✨"];

        for (let i = 1; i <= 10; i++) {
            const img = document.createElement('img');
            img.src = `${i}.jpg`;
            img.className = 'thumb';
            img.onclick = () => { selectedImg = img.src; start(); };
            gallery.appendChild(img);
        }

        function start() {
            document.getElementById('gallery-container').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            order.sort(() => Math.random() - 0.5);
            draw();
            setInterval(spawnCheer, 5500);
        }

        function draw() {
            board.innerHTML = '';
            order.forEach((pos, i) => {
                const tile = document.createElement('div');
                tile.className = 'tile' + (pos === 8 ? ' empty' : '');
                if (pos !== 8) {
                    tile.style.backgroundImage = `url(${selectedImg})`;
                    tile.style.backgroundPosition = `${(pos % 3) * 50}% ${Math.floor(pos / 3) * 50}%`;
                    tile.onclick = () => swap(i);
                }
                board.appendChild(tile);
            });
        }

        function swap(i) {
            const emptyIdx = order.indexOf(8);
            const isNear = [i-1, i+1, i-3, i+3].includes(emptyIdx);
            const isJump = (Math.abs(i - emptyIdx) === 1 && Math.floor(i/3) !== Math.floor(emptyIdx/3));

            if (isNear && !isJump) {
                [order[i], order[emptyIdx]] = [order[emptyIdx], order[i]];
                moves++;
                document.getElementById('moves').innerText = `MOVIMIENTOS: ${moves}`;
                draw();
                if (order.every((v, i) => v === i)) win();
            }
        }

        function spawnCheer() {
            const isMahia = Math.random() > 0.5;
            const el = document.getElementById(isMahia ? 'mahita-c' : 'lalito-c');
            const b = el.querySelector('.bubble');
            if (el.classList.contains('active')) return;

            el.style.left = Math.random() * 65 + "vw";
            el.style.top = Math.random() * 70 + "vh";
            
            b.innerText = isMahia ? frasesMahia[Math.floor(Math.random()*4)] : frasesLalo[Math.floor(Math.random()*4)];
            el.classList.add('active');

            if(document.getElementById('mahita-c').classList.contains('active') && 
               document.getElementById('lalito-c').classList.contains('active')) {
                createHearts();
            }

            setTimeout(() => el.classList.remove('active'), 3000);
        }

        function createHearts() {
            for(let i=0; i<5; i++) {
                const h = document.createElement('div');
                h.innerHTML = '❤️';
                h.className = 'heart';
                h.style.left = (window.innerWidth/2 + (Math.random()*60 - 30)) + 'px';
                h.style.top = (window.innerHeight/2) + 'px';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 1500);
            }
        }

        function win() {
            Swal.fire({ 
                title: '¡LO LOGRASTE! 🏆', 
                text: 'Puzzle completado con éxito', 
                background: '#1a0525', 
                color: '#00f3ff', 
                confirmButtonText: '¡OTRA!' 
            }).then(() => location.reload());
        }
    </script>
</body>
</html>
