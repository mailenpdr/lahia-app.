<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lalhia - Arcade Neon</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-fresa: #ff0055;
            --neon-blue: #00f2fe;
            --arcade-bg: #1a001d; /* Morado muy oscuro */
            --white: #fff;
            --cafe: #5d4037; /* Mantenemos para contraste */
        }

        body {
            background-color: var(--arcade-bg);
            font-family: 'VT323', monospace;
            text-align: center;
            margin: 0; padding: 0;
            color: var(--white);
            padding-bottom: 140px;
            overflow-x: hidden;
            /* Fondo con cuadrícula sutil */
            background-image: 
                linear-gradient(rgba(255, 0, 85, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 85, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- HEADER ARCADE --- */
        header {
            padding: 40px 20px;
            background: #000;
            border-bottom: 5px solid var(--neon-fresa);
            box-shadow: 0 0 20px var(--neon-fresa);
            position: relative;
        }

        h1 {
            color: var(--white);
            font-size: 4.5rem;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 
                0 0 5px var(--white),
                0 0 10px var(--white),
                0 0 20px var(--neon-fresa),
                0 0 40px var(--neon-fresa);
            animation: flicker 2s infinite;
        }

        p.subtitle {
            font-size: 1.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-top: -10px;
        }

        /* --- GRID DE JUEGOS --- */
        .grid-juegos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px 20px;
            max-width: 550px;
            margin: 0 auto;
        }

        .btn-juego {
            background: #000;
            border: 3px solid var(--neon-blue);
            padding: 25px 10px;
            text-decoration: none;
            color: var(--white);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Efecto Hover/Active */
        .btn-juego:hover, .btn-juego:active {
            border-color: var(--neon-fresa);
            box-shadow: 0 0 20px var(--neon-fresa);
            transform: scale(1.05) translateY(-5px);
        }

        .btn-juego:active {
            transform: scale(0.95) translateY(0);
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px var(--white));
        }

        .title {
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--white);
        }

        /* --- ANIMACIONES --- */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 5px var(--white), 0 0 10px var(--white), 0 0 20px var(--neon-fresa), 0 0 40px var(--neon-fresa);
            }
            20%, 24%, 55% { text-shadow: none; }
        }

        /* --- NAV INFERIOR --- */
        .pixel-nav {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); width: 85%;
            max-width: 400px; background: #000;
            border: 4px solid var(--neon-fresa);
            display: flex; justify-content: space-around;
            padding: 15px 0; box-shadow: 0 0 15px var(--neon-fresa);
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none; color: var(--white);
            font-size: 1.2rem; text-align: center;
            text-shadow: 0 0 5px var(--neon-fresa);
        }
    </style>
</head>
<body>
    <header>
        <h1>ARCADE</h1>
        <p class="subtitle">SELECT YOUR GAME</p>
    </header>

    <div class="grid-juegos">
        <a href="game-catch.html" class="btn-juego">
            <span class="icon">🍎</span><span class="title">RECOLECTAR</span>
        </a>
        <a href="game-memory.html" class="btn-juego">
            <span class="icon">🧩</span><span class="title">MEMORIA</span>
        </a>
        <a href="game-jump.html" class="btn-juego">
            <span class="icon">☁️</span><span class="title">SALTAR</span>
        </a>
        <a href="game-puzzle.html" class="btn-juego">
            <span class="icon">🖼️</span><span class="title">PUZZLE</span>
        </a>
        <a href="game-2048.html" class="btn-juego">
            <span class="icon">🔢</span><span class="title">2048</span>
        </a>
        <a href="game-dodge.html" class="btn-juego">
            <span class="icon">🏃</span><span class="title">ESQUIVAR</span>
        </a>
    </div>

    <nav class="pixel-nav">
        <a href="dashboard.html" class="nav-item">🏠 INICIO</a>
        <a href="mood.html" class="nav-item">🌈 MOOD</a>
        <a href="ajustes.html" class="nav-item">⚙️ AJUSTES</a>
    </nav>
</body>
</html>
