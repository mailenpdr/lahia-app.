<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lalhia-Chi ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --p-accent: #ff4d6d;
            --p-cafe: #5d4037;
            --p-rosa: #ffb3c1;
            --borde: 4px solid var(--p-cafe);
            --sombra: 6px 6px 0px var(--p-cafe);
        }

        body { 
            background-color: #fffcfc;
            background-image: radial-gradient(var(--p-rosa) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            font-family: 'VT323', monospace;
            margin: 0; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            touch-action: manipulation;
        }
        
        /* --- CONSOLA --- */
        .console-frame {
            background: white; border: var(--borde); box-shadow: var(--sombra);
            width: 85%; max-width: 320px; height: 65vh; margin-top: 20px;
            display: flex; flex-direction: column; position: relative;
            border-radius: 20px;
        }

        .screen { 
            background: #fdf2f4; border: 3px solid var(--p-cafe);
            margin: 10px; flex-grow: 1; position: relative; overflow: hidden;
            border-radius: 10px;
        }

        /* --- BARRAS --- */
        .status-panel { padding: 10px; border-bottom: var(--borde); }
        .bar-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .bar-label { font-size: 1.2rem; font-weight: bold; width: 60px; }
        .bar-bg { background: #ddd; border: 2px solid var(--p-cafe); width: 120px; height: 12px; border-radius: 5px; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.5s ease-in-out; }
        #fill-hambre { background: #ffa726; }
        #fill-amor { background: var(--p-accent); }

        /* --- GATITO --- */
        #petContainer {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 150px; height: 150px; cursor: pointer;
            transition: transform 0.2s;
        }
        .pet-avatar { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

        /* --- MENÚ DE COMIDA --- */
        .items-menu {
            display: flex; justify-content: center; gap: 15px;
            padding: 10px; background: #fff0f3; border-top: var(--borde);
        }
        .item-btn {
            font-size: 2rem; background: white; border: 2px solid var(--p-cafe);
            padding: 5px; border-radius: 10px; cursor: pointer;
            transition: all 0.2s; box-shadow: 3px 3px 0px var(--p-cafe);
        }
        .item-btn.selected {
            background: var(--p-rosa);
            transform: translateY(-5px);
            box-shadow: 0px 5px 0px var(--p-cafe);
            border-color: var(--p-accent);
        }

        /* --- NAV --- */
        .nav-bar {
            position: fixed; bottom: 15px; width: 90%; max-width: 350px;
            background: white; border: var(--borde); box-shadow: var(--sombra);
            display: flex; justify-content: space-around; padding: 10px 0;
            border-radius: 15px;
        }
        .nav-link { text-decoration: none; color: var(--p-cafe); text-align: center; font-size: 1rem; font-weight: bold; }

        /* Globito de habla */
        .bubble {
            background: white; border: 2px solid var(--p-cafe); padding: 5px 10px;
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            display: none; border-radius: 10px; z-index: 10; font-size: 1.2rem;
        }

        /* Animaciones */
        .jump { animation: jumpAnim 0.4s ease; }
        @keyframes jumpAnim {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="console-frame">
        <div class="status-panel">
            <div class="bar-container">
                <span class="bar-label">PANZA:</span>
                <div class="bar-bg"><div id="fill-hambre" class="bar-fill"></div></div>
            </div>
            <div class="bar-container">
                <span class="bar-label">AMOR:</span>
                <div class="bar-bg"><div id="fill-amor" class="bar-fill"></div></div>
            </div>
        </div>

        <div class="screen">
            <div id="petContainer" onclick="interactuarConGato()">
                <div id="bubble" class="bubble"></div>
                <img id="petImg" class="pet-avatar" src="gato4.png">
            </div>
        </div>

        <div class="items-menu">
            <div class="item-btn" onclick="seleccionarItem('fish', this)">🐟</div>
            <div class="item-btn" onclick="seleccionarItem('water', this)">💧</div>
            <div class="item-btn" onclick="seleccionarItem('candy', this)">🍬</div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-link">🏠 INICIO</a>
        <a href="mood.html" class="nav-link">🌈 MOOD</a>
        <a href="ajustes.html" class="nav-link">⚙️ AJUSTES</a>
    </nav>

    <script>
        const pet = document.getElementById('petImg');
        const container = document.getElementById('petContainer');
        const barHambre = document.getElementById('fill-hambre');
        const barAmor = document.getElementById('fill-amor');
        const bub = document.getElementById('bubble');
        
        let hambre = 100;
        let amor = 100;
        let itemSeleccionado = null;

        // --- SISTEMA DE TIEMPO (Baja cada 10 minutos aprox) ---
        // Para que veas el cambio, baja 1% cada 10 segundos (ajústalo si quieres más lento)
        setInterval(() => {
            hambre = Math.max(0, hambre - 1);
            amor = Math.max(0, amor - 1);
            actualizarBarras();
            
            // Si tiene hambre/está triste
            if (hambre < 25 || amor < 25) {
                actualizarGato(1);
            }
        }, 10000); 

        function actualizarBarras() {
            barHambre.style.width = hambre + "%";
            barAmor.style.width = amor + "%";
        }

        function actualizarGato(num) {
            pet.src = `gato${num}.png`;
        }

        function hablar(txt) {
            bub.innerText = txt;
            bub.style.display = "block";
            setTimeout(() => bub.style.display = "none", 2000);
        }

        // 1. SELECCIONAR COMIDA
        function seleccionarItem(tipo, elemento) {
            // Quitar clase a otros
            document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('selected'));
            
            if (itemSeleccionado === tipo) {
                itemSeleccionado = null;
            } else {
                itemSeleccionado = tipo;
                elemento.classList.add('selected');
                hablar("¡Dáselo al gato!");
            }
        }

        // 2. TOCAR AL GATO (Para comer o dar cariño)
        function interactuarConGato() {
            container.classList.add('jump');
            setTimeout(() => container.classList.remove('jump'), 400);

            if (itemSeleccionado) {
                // ACCIÓN: COMER
                hambre = Math.min(100, hambre + 30);
                actualizarGato(3); // Imagen de comer
                hablar("¡ÑAM ÑAM! ✨");
                
                // Deseleccionar
                itemSeleccionado = null;
                document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('selected'));
                
                setTimeout(() => {
                    if (hambre > 80) actualizarGato(2); // Dormir si está lleno
                    else actualizarGato(4);
                }, 2000);

            } else {
                // ACCIÓN: CARIÑO
                amor = Math.min(100, amor + 15);
                if (hambre < 30) {
                    actualizarGato(1);
                    hablar("Tengo hambre... 😿");
                } else {
                    // Ponemos un gato feliz aleatorio (4 al 7)
                    const randomFeliz = Math.floor(Math.random() * 4) + 4;
                    actualizarGato(randomFeliz);
                    hablar("¡Miau! ❤️");
                }
            }
            actualizarBarras();
        }

        // Iniciar barras
        actualizarBarras();
    </script>
</body>
</html>
