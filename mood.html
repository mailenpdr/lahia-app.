<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lalhia - Mood Jars</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --fresa: #ffb3c1;
            --fresa-fuerte: #ff4d6d;
            --crema: #fffaff;
            --cafe: #5d4037;
        }

        body {
            background-color: var(--crema);
            font-family: 'VT323', monospace;
            margin: 0; padding: 0;
            height: 100dvh;
            color: var(--cafe);
            text-align: center;
            overflow: hidden;
            touch-action: none; /* Bloqueo total de gestos del sistema */
            -webkit-user-select: none; /* Evita que se seleccione texto al tocar */
        }

        .header-mood { padding: 10px; background: white; border-bottom: 4px solid var(--fresa); height: 80px; }
        
        #user-indicator {
            display: inline-block; padding: 4px 12px;
            background: var(--fresa); border-radius: 20px; color: white; font-size: 1rem;
        }

        .jars-container {
            display: flex; justify-content: center; gap: 10px; padding: 10px 5px;
        }

        .jar {
            width: 120px; height: 160px; border: 4px solid var(--cafe);
            border-radius: 15px 15px 40% 40%; background: rgba(255, 255, 255, 0.9);
            display: flex; flex-wrap: wrap-reverse;
            align-content: flex-start; padding: 8px; gap: 4px;
            box-shadow: inset 5px 0 10px rgba(0,0,0,0.05);
        }

        .jar-label { 
            margin-top: 5px; font-size: 1.1rem; background: var(--cafe); 
            color: white; padding: 2px 10px; border-radius: 5px;
        }

        .mood-bank {
            background: white; margin: 10px auto; width: 90%;
            padding: 10px; border: 3px solid var(--cafe);
            box-shadow: 5px 5px 0px var(--fresa); border-radius: 10px;
        }

        .bank-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin-top: 5px;
        }

        .ball-item { display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }

        .mood-ball {
            width: 35px; height: 35px; border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* COLORES */
        .m-feliz { background: #ffeb3b; }
        .m-amor { background: #ff4081; }
        .m-textraño { background: #f06292; }
        .m-verte { background: #ff9800; }
        .m-hablar { background: #4caf50; }
        .m-triste { background: #2196f3; }
        .m-enojo { background: #f44336; }
        .m-ansiedad { background: #8d6e63; }

        .btn-clear {
            background: var(--fresa-fuerte); color: white;
            border: 3px solid var(--cafe); padding: 8px;
            font-family: 'VT323'; font-size: 1.1rem;
            width: 60%; margin-top: 5px;
        }

        .pixel-nav {
            position: fixed; bottom: 15px; left: 50%;
            transform: translateX(-50%); width: 85%;
            background: white; border: 3px solid var(--cafe);
            display: flex; justify-content: space-around;
            padding: 8px 0; z-index: 2000;
        }
        .pixel-nav a { text-decoration: none; color: var(--cafe); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header-mood">
        <h1>FRASCOS MÁGICOS ✨</h1>
        <span id="user-indicator">Cargando...</span>
    </div>

    <div class="jars-container">
        <div class="jar-wrapper">
            <div id="jar-lalo" class="jar"></div>
            <div class="jar-label">LALO</div>
        </div>
        <div class="jar-wrapper">
            <div id="jar-mia" class="jar"></div>
            <div class="jar-label">MAHIA</div>
        </div>
    </div>

    <div class="mood-bank">
        <span>Toca y arrastra al frasco:</span>
        <div class="bank-grid">
            <div class="ball-item"><div class="mood-ball m-feliz" id="feliz"></div><span>Feliz</span></div>
            <div class="ball-item"><div class="mood-ball m-amor" id="amor"></div><span>Amor</span></div>
            <div class="ball-item"><div class="mood-ball m-textraño" id="textraño"></div><span>Extraño</span></div>
            <div class="ball-item"><div class="mood-ball m-verte" id="verte"></div><span>Verte</span></div>
            <div class="ball-item"><div class="mood-ball m-hablar" id="hablar"></div><span>Hablar</span></div>
            <div class="ball-item"><div class="mood-ball m-triste" id="triste"></div><span>Triste</span></div>
            <div class="ball-item"><div class="mood-ball m-enojo" id="enojo"></div><span>Enojo</span></div>
            <div class="ball-item"><div class="mood-ball m-ansiedad" id="ansiedad"></div><span>Ansia</span></div>
        </div>
    </div>

    <button class="btn-clear" onclick="confirmarLimpieza()">LIMPIAR MI FRASCO</button>

    <nav class="pixel-nav">
        <a href="dashboard.html">🏠 INICIO</a>
        <a href="mood.html" style="color:var(--fresa-fuerte)">🌈 MOOD</a>
        <a href="ajustes.html">⚙️ AJUSTES</a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, setDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const userRaw = localStorage.getItem('usuarioActual') || 'invitado';
        const currentProfile = userRaw.toLowerCase().includes('mahia') || userRaw.toLowerCase() === 'mia' ? 'mia' : 'lalo';
        document.getElementById('user-indicator').innerText = `PERFIL: ${currentProfile.toUpperCase()}`;

        const balls = document.querySelectorAll('.mood-ball');
        let activeBall = null;
        let clone = null;

        balls.forEach(ball => {
            ball.addEventListener('touchstart', function(e) {
                e.preventDefault();
                activeBall = this;
                
                // Creamos un clon visual para arrastrarlo sin mover el original de la cuadrícula
                clone = this.cloneNode(true);
                clone.style.position = 'fixed';
                clone.style.width = '40px';
                clone.style.height = '40px';
                clone.style.pointerEvents = 'none'; // Importante para que no bloquee la detección
                clone.style.zIndex = '3000';
                document.body.appendChild(clone);
                
                const touch = e.touches[0];
                updatePos(touch.clientX, touch.clientY);
            }, {passive: false});

            ball.addEventListener('touchmove', function(e) {
                if (!clone) return;
                e.preventDefault();
                const touch = e.touches[0];
                updatePos(touch.clientX, touch.clientY);
            }, {passive: false});

            ball.addEventListener('touchend', async function(e) {
                if (!clone) return;
                
                const touch = e.changedTouches[0];
                const x = touch.clientX;
                const y = touch.clientY;

                // Obtenemos el frasco de Mahia y el de Lalo
                const jarMia = document.getElementById('jar-mia').getBoundingClientRect();
                const jarLalo = document.getElementById('jar-lalo').getBoundingClientRect();

                let target = null;
                // Verificamos si soltamos dentro del área de Mahia
                if (x >= jarMia.left && x <= jarMia.right && y >= jarMia.top && y <= jarMia.bottom) {
                    target = 'mia';
                } 
                // O dentro del área de Lalo
                else if (x >= jarLalo.left && x <= jarLalo.right && y >= jarLalo.top && y <= jarLalo.bottom) {
                    target = 'lalo';
                }

                if (target) {
                    if (target === currentProfile) {
                        const moodType = activeBall.id;
                        await setDoc(doc(db, `moods_${currentProfile}`, Date.now().toString()), {
                            type: moodType,
                            timestamp: Date.now()
                        });
                    } else {
                        Swal.fire({ title: '¡Ups!', text: '¡Ese frasco es ajeno! ❤️', icon: 'error', timer: 1500, showConfirmButton: false });
                    }
                }

                document.body.removeChild(clone);
                clone = null;
                activeBall = null;
            });
        });

        function updatePos(x, y) {
            clone.style.left = (x - 20) + 'px';
            clone.style.top = (y - 20) + 'px';
        }

        function cargarFrasco(perfil) {
            onSnapshot(collection(db, `moods_${perfil}`), (snapshot) => {
                const jar = document.getElementById(`jar-${perfil}`);
                jar.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const b = document.createElement('div');
                    b.className = `mood-ball m-${data.type}`;
                    b.style.width = '22px'; b.style.height = '22px';
                    jar.appendChild(b);
                });
            });
        }

        window.confirmarLimpieza = () => {
            Swal.fire({
                title: '¿Vaciar?',
                showCancelButton: true,
                confirmButtonColor: '#ff4d6d'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const snap = await getDocs(collection(db, `moods_${currentProfile}`));
                    snap.docs.forEach(d => deleteDoc(doc(db, `moods_${currentProfile}`, d.id)));
                }
            });
        };

        cargarFrasco('lalo');
        cargarFrasco('mia');
    </script>
</body>
</html>
