<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lalhia - Mis Notitas</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-accent: #ff4d6d;
            --cream-bg: #fffcfc;
            --grid-dot: #ffd4dd;
            --cafe-dark: #5d4037;
            --borde-pixel: 4px solid var(--cafe-dark);
            --sombra-pixel: 6px 6px 0px var(--cafe-dark);
        }

        body {
            background-color: var(--cream-bg);
            background-image: radial-gradient(var(--grid-dot) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            font-family: 'Quicksand', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- TITULO ESTILO DASH --- */
        .dash-header {
            margin-top: 20px;
            text-align: center;
        }
        .pixel-title {
            font-family: 'VT323', monospace;
            font-size: 2.2rem;
            color: var(--pink-accent);
            text-transform: uppercase;
            margin: 0;
        }

        /* --- CONTENEDOR TIPO "CUADRO DEL DASHBOARD" --- */
        /* Aquí es donde flotarán las notas, como si fuera el cuadro del gatito */
        .main-frame {
            position: relative;
            width: 85%;
            flex: 1;
            margin: 20px 0 110px 0; /* Espacio para el menú abajo */
            background: white;
            border: var(--borde-pixel);
            box-shadow: var(--sombra-pixel);
            overflow: hidden; /* Para que las nubes no se salgan del cuadro */
        }

        /* --- LAS NUBECITAS --- */
        .nube-nota {
            position: absolute;
            background: white;
            border: 3px solid var(--cafe-dark);
            border-radius: 20px;
            padding: 10px 15px;
            max-width: 120px;
            font-size: 0.85rem;
            color: var(--cafe-dark);
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
            animation: flotar 4s ease-in-out infinite alternate;
            word-wrap: break-word;
        }

        .nube-nota b {
            display: block;
            font-family: 'VT323', monospace;
            color: var(--pink-accent);
            font-size: 1rem;
            border-bottom: 1px solid #eee;
            margin-bottom: 4px;
        }

        @keyframes flotar {
            from { transform: translateY(0px) rotate(-1deg); }
            to { transform: translateY(-10px) rotate(1deg); }
        }

        /* --- INPUT (DENTRO DEL ESTILO) --- */
        .input-box {
            position: absolute;
            bottom: 10px;
            left: 5%;
            width: 90%;
            display: flex;
            gap: 5px;
        }

        .pixel-input {
            flex: 1;
            border: 3px solid var(--cafe-dark);
            padding: 8px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.8rem;
            outline: none;
        }

        .btn-enviar {
            background: var(--pink-accent);
            border: 3px solid var(--cafe-dark);
            color: white;
            padding: 0 10px;
            cursor: pointer;
            font-family: 'VT323', monospace;
        }

        /* --- MENU INFERIOR (EL DE TU IMAGEN) --- */
        .nav-menu {
            position: fixed;
            bottom: 20px;
            width: 90%;
            height: 70px;
            background: white;
            border: var(--borde-pixel);
            box-shadow: var(--sombra-pixel);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            text-decoration: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-icon { font-size: 1.4rem; }
        .nav-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--cafe-dark);
        }
        .active { color: var(--pink-accent); }

    </style>
</head>
<body>

    <div class="dash-header">
        <h1 class="pixel-title">¡NOTITAS MÁGICAS! ✨</h1>
    </div>

    <div class="main-frame" id="contenedorPrincipal">
        <div id="cielo-notas">
            </div>

        <div class="input-box">
            <input type="text" id="notaTxt" class="pixel-input" placeholder="Sube una nube...">
            <button id="btnSubir" class="btn-enviar">OK</button>
        </div>
    </div>

    <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-label active">INICIO</span>
        </a>
        <a href="mood.html" class="nav-item">
            <span class="nav-icon">🌈</span>
            <span class="nav-label">MOOD</span>
        </a>
        <a href="ajustes.html" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">AJUSTES</span>
        </a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const cielo = document.getElementById('cielo-notas');
        const input = document.getElementById('notaTxt');
        const btn = document.getElementById('btnSubir');
        const usuario = localStorage.getItem('usuarioActual') || 'Mahia';

        function crearNube(nota) {
            const nube = document.createElement('div');
            nube.className = 'nube-nota';
            
            // Posiciones aleatorias DENTRO del cuadro
            const x = Math.random() * 60; // Porcentaje
            const y = Math.random() * 60; // Porcentaje
            
            nube.style.left = x + '%';
            nube.style.top = y + '%';
            nube.style.animationDelay = (Math.random() * 2) + 's';

            nube.innerHTML = `<b>${nota.autor}</b>${nota.texto}`;
            cielo.appendChild(nube);
        }

        const q = query(collection(db, "notas"), orderBy("fecha", "desc"), limit(8));
        onSnapshot(q, (snapshot) => {
            cielo.innerHTML = '';
            snapshot.forEach(doc => crearNube(doc.data()));
        });

        btn.onclick = async () => {
            if(!input.value.trim()) return;
            await addDoc(collection(db, "notas"), {
                texto: input.value,
                autor: usuario,
                fecha: serverTimestamp()
            });
            input.value = '';
        };
    </script>
</body>
</html>
